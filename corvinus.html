<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Google Drive Center</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top left,#667eea,transparent 40%),
        radial-gradient(circle at bottom right,#764ba2,transparent 40%),
        linear-gradient(135deg,#141e30,#243b55);

    color:white;
    overflow:hidden;
}


.container {

    width:90%;
    max-width:650px;

    padding:45px 40px;

    text-align:center;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(20px);

    border-radius:25px;

    border:1px solid rgba(255,255,255,0.25);

    box-shadow:
    0 25px 50px rgba(0,0,0,.35);

    animation:fadeIn 1s ease;

}


@keyframes fadeIn {

    from {
        opacity:0;
        transform:translateY(30px);
    }

    to {
        opacity:1;
        transform:translateY(0);
    }

}


.icon {

    font-size:70px;

    margin-bottom:20px;

}


h1 {

    font-size:32px;

    margin-bottom:15px;

    letter-spacing:2px;

}


p {

    color:rgba(255,255,255,.8);

    font-size:16px;

    line-height:1.8;

    margin-bottom:35px;

}



.btn {

    display:inline-block;

    padding:16px 40px;

    background:
    linear-gradient(135deg,#00c6ff,#0072ff);

    color:white;

    text-decoration:none;

    font-size:18px;

    border-radius:50px;

    box-shadow:
    0 10px 25px rgba(0,114,255,.4);

    transition:.3s;

}


.btn:hover {

    transform:translateY(-5px) scale(1.05);

    box-shadow:
    0 15px 35px rgba(0,114,255,.6);

}



.footer {

    margin-top:35px;

    font-size:13px;

    color:rgba(255,255,255,.5);

}



.circle {

    position:absolute;

    border-radius:50%;

    filter:blur(60px);

    opacity:.4;

}



.c1 {

    width:300px;

    height:300px;

    background:#00c6ff;

    top:-100px;

    left:-100px;

}



.c2 {

    width:350px;

    height:350px;

    background:#ff00cc;

    bottom:-150px;

    right:-100px;

}

</style>

</head>


<body>


<div class="circle c1"></div>
<div class="circle c2"></div>


<div class="container">


<div class="icon">
📂
</div>


<h1>
Sunny Corvinus
</h1>


<p>
Access shared files and resources - CUB Finance Master<br>
Click below to open the folder
</p>



<a class="btn"
href="https://drive.google.com/drive/folders/1QFvu912fnTRJnYyGdvBYYZ1pmBN8bAPZ?usp=sharing"
target="_blank">

🚀 Open Folder

</a>



<div class="footer">

Powered by Google Drive

</div>


</div>


</body>
</html>
